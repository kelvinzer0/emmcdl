on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-win32:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # REMOVE the "Setup Visual Studio environment" step completely
      
    - name: Restore NuGet packages
      run: nuget restore emmcdl.win32.sln
      shell: cmd

    - name: Build emmcdl Win32 Release
      run: msbuild emmcdl.win32.sln /p:Platform=Win32 /p:Configuration=Release
      shell: cmd

    - name: Upload Release artifact
      uses: actions/upload-artifact@v4
      with:
        name: emmcdl-release
        path: emmcdl\bin\Release\
