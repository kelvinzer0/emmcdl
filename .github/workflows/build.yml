on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-win32:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Create stub fdevent.h
        shell: pwsh
        run: |
          @'
          #pragma once
          #ifndef FDEVENT_H
          #define FDEVENT_H
          typedef struct fdevent {
              struct fdevent *next;
              struct fdevent *prev;
              int    fd;
              int    clfd;
              unsigned short state;
              unsigned short events;
              void (*func)(int fd, unsigned events, void *userdata);
              void  *arg;
          } fdevent;
          #endif
          '@ | Set-Content -Encoding UTF8 inc\fdevent.h

      - name: Create stub mutex_list.h
        shell: pwsh
        run: |
          @'
          #pragma once
          /* mutex list stub for Windows build */
          '@ | Set-Content -Encoding UTF8 inc\mutex_list.h

      - name: Fix vcxproj - rename diskwriter.cpp to diskwriter_windows.cpp
        shell: pwsh
        run: |
          $file = "emmcdl.win32.vcxproj"
          $content = [System.IO.File]::ReadAllText($file)
          $content = $content.Replace('src\diskwriter.cpp', 'src\diskwriter_windows.cpp')
          [System.IO.File]::WriteAllText($file, $content)
          Write-Host "vcxproj fixed:"
          Select-String "diskwriter" $file

      - name: Restore NuGet packages
        run: nuget restore emmcdl.win32.sln
        shell: cmd

      - name: Build emmcdl Win32 Release
        run: msbuild emmcdl.win32.sln /p:Platform=Win32 /p:Configuration=Release /p:PlatformToolset=v143
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: emmcdl-win32-release
          path: Release\emmcdl.exe
